<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VoltSound</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    letter-spacing:4px;
}

.speed{
    font-size:140px;
    font-weight:bold;
    line-height:1;
}

.unit{
    font-size:24px;
    opacity:.8;
}

button{
    margin-top:30px;
    padding:20px 40px;
    font-size:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>VOLTSOUND</h1>

<div class="speed" id="speed">0</div>

<div class="unit">km/h</div>

<button onclick="startDemo()">START</button>

</div>

<script>

const sound = new Audio("iconic.wav");
sound.loop = true;
sound.preload = "auto";

let speed = 0;
let started = false;

function startDemo(){

    if(started) return;
    started = true;

    sound.play().catch(err => {
        console.log(err);
    });

    setInterval(() => {

        speed += 1;

        if(speed > 140){
            speed = 0;
        }

        document.getElementById("speed").textContent = speed;

        sound.playbackRate = 1 + (speed / 200);

    }, 50);

}

</script>

</body>
</html>
