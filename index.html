<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VoltSound</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
}

.speed{
font-size:140px;
font-weight:bold;
}

button{
padding:20px 40px;
font-size:20px;
border:none;
border-radius:12px;
}
</style>

</head>

<body>

<div class="container">

<h1>VOLTSOUND</h1>

<div class="speed" id="speed">0</div>

<div>km/h</div>

<button onclick="startDemo()">
START
</button>

</div>

<script>

const sound = new Audio("iconic.wav");
sound.loop = true;

let speed = 0;

function startDemo(){

sound.play();

setInterval(()=>{

speed += 5;

if(speed > 140){
speed = 0;
}

document.getElementById("speed").innerText =
Math.round(speed);

sound.playbackRate =
1 + speed / 120;

},300);

}

</script>

</body>
</html>
