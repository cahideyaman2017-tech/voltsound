<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoltSound</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#speed{
    font-size:120px;
    font-weight:200;
    line-height:1;
}

#status{
    margin-top:15px;
    opacity:.7;
    font-size:18px;
}

button{
    margin-top:35px;
    padding:16px 40px;
    font-size:22px;
    border:none;
    border-radius:12px;
}
</style>
</head>
<body>

<div id="speed">0</div>
<div id="status">READY</div>

<button id="startBtn">START</button>

<script>

let currentAudio = null;
let currentMode = "";

let lastLat = null;
let lastLon = null;
let lastTime = null;

let smoothedSpeed = 0;
let previousSpeed = 0;

const files = {
    idle: "idle.wav",
    cruise: "cruise.wav",
    sport: "sport.wav",
    boost: "boost.wav"
};

function distanceMeters(lat1, lon1, lat2, lon2){

    const R = 6371000;

    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2) ** 2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) ** 2;

    return R * 2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );
}

function chooseMode(speed){

    if(speed < 30) return "idle";
    if(speed < 80) return "cruise";
    if(speed < 140) return "sport";
    return "boost";
}

async function fadeToMode(mode){

    if(mode === currentMode) return;

    const oldAudio = currentAudio;

    const newAudio = new Audio(files[mode]);

    newAudio.loop = true;
    newAudio.volume = 0;

    try{
        await newAudio.play();
    }catch(e){}

    currentAudio = newAudio;
    currentMode = mode;

    let step = 0;

    const fade = setInterval(()=>{

        step += 0.05;

        if(oldAudio){
            oldAudio.volume = Math.max(0, 1-step);
        }

        newAudio.volume = Math.min(0.75, step*0.75);

        if(step >= 1){

            clearInterval(fade);

            if(oldAudio){
                oldAudio.pause();
            }
        }

    },50);
}

function updateEngine(speed){

    if(!currentAudio) return;

    const accel = speed - previousSpeed;

    let pitch = 0.85 + (speed / 130);

    if(accel > 1){
        pitch += 0.08;
    }

    if(accel < -1){
        pitch -= 0.05;
    }

    pitch = Math.max(0.85, Math.min(2.0, pitch));

    currentAudio.playbackRate = pitch;

    let targetVolume = 0.65;

    if(accel > 1){
        targetVolume = 0.80;
    }

    if(accel < -1){
        targetVolume = 0.50;
    }

    currentAudio.volume +=
        (targetVolume - currentAudio.volume) * 0.10;

    previousSpeed = speed;
}

document.getElementById("startBtn").onclick = () => {

    fadeToMode("idle");

    navigator.geolocation.watchPosition(

        pos => {

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const now = Date.now();

            let kmh = 0;

            if(lastLat !== null){

                const meters =
                    distanceMeters(
                        lastLat,
                        lastLon,
                        lat,
                        lon
                    );

                const seconds =
                    (now-lastTime)/1000;

                if(seconds > 0){

                    kmh =
                        (meters/seconds)*3.6;
                }
            }

            lastLat = lat;
            lastLon = lon;
            lastTime = now;

            smoothedSpeed +=
                (kmh - smoothedSpeed) * 0.15;

            const speed =
                Math.max(0,
                Math.round(smoothedSpeed));

            document.getElementById("speed").innerText =
                speed;

            const mode =
                chooseMode(speed);

            fadeToMode(mode);

            updateEngine(speed);

            document.getElementById("status").innerText =
                mode.toUpperCase();

        },

        err => {

            document.getElementById("status").innerText =
                "GPS ERROR";
        },

        {
            enableHighAccuracy:true,
            maximumAge:0,
            timeout:10000
        }

    );

};

</script>

</body>
</html>
