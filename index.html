<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoltSound - Demo Simulation Edition</title>

<!-- Google Fonts: Fütüristik / Sci-Fi Tarzı Font (Orbitron) -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    color:#fafafa;
    font-family: 'Orbitron', sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Ekranın altındaki Grok tarzı Kuzey Işıkları (Aurora Gradient) Efekti */
.aurora-glow {
    position: fixed;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 120vw;
    height: 300px;
    background: radial-gradient(ellipse at bottom, rgba(56, 189, 248, 0.25) 0%, rgba(14, 165, 233, 0.08) 40%, transparent 70%);
    filter: blur(50px);
    pointer-events: none;
    z-index: 1;
    animation: auroraPulse 6s ease-in-out infinite alternate;
}

@keyframes auroraPulse {
    0% {
        opacity: 0.5;
        transform: translateX(-50%) scale(0.95);
    }
    100% {
        opacity: 0.9;
        transform: translateX(-50%) scale(1.05);
    }
}

.container{
    text-align:center;
    background:rgba(10, 10, 15, 0.75);
    border: 1px solid rgba(56, 189, 248, 0.3);
    padding: 40px 60px;
    border-radius: 32px;
    box-shadow: 0 0 50px rgba(56, 189, 248, 0.15);
    backdrop-filter: blur(16px);
    z-index: 2;
    position: relative;
    width: 280px;
    height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.slider-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.panel {
    position: absolute;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
}

#startPanel {
    transform: scale(1);
    opacity: 1;
}

#startPanel.zoom-out {
    transform: scale(0.5);
    opacity: 0;
    pointer-events: none;
}

#metricPanel {
    transform: scale(1.5);
    opacity: 0;
    pointer-events: none;
}

#metricPanel.zoom-in {
    transform: scale(1);
    opacity: 1;
    pointer-events: auto;
}

#status{
    margin-bottom: 15px;
    padding: 8px 16px;
    background: rgba(56, 189, 248, 0.15);
    color: #38bdf8;
    border-radius: 20px;
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease 0.2s, transform 0.6s ease 0.2s;
}

#metricPanel.zoom-in #status {
    opacity: 1;
    transform: translateY(0);
}

button{
    padding: 16px 36px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Orbitron', sans-serif;
    color: #000;
    background: #38bdf8;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.5);
    letter-spacing: 1.5px;
}

button:hover {
    background: #7dd3fc;
    box-shadow: 0 0 45px rgba(56, 189, 248, 0.8);
    transform: scale(1.05);
}

/* Sıvı Cam Durdur Butonu */
button.stop-btn {
    background: rgba(185, 28, 28, 0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(239, 68, 68, 0.4);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37), inset 0 1px 1px rgba(255, 255, 255, 0.2);
    color: #fca5a5;
    font-size: 14px;
    padding: 10px 24px;
    margin-top: 6px;
}
button.stop-btn:hover {
    background: rgba(220, 38, 38, 0.4);
    border-color: rgba(248, 113, 113, 0.7);
    box-shadow: 0 8px 32px rgba(220, 38, 38, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.4);
    color: #fff;
    transform: scale(1.05);
}

/* Sağ Üst Köşedeki Demo Test Etme Butonu */
.demo-btn {
    position: fixed;
    top: 25px;
    right: 25px;
    background: rgba(56, 189, 248, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(56, 189, 248, 0.4);
    color: #38bdf8;
    padding: 10px 20px;
    border-radius: 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
    transition: all 0.2s ease;
    user-select: none;
    -webkit-user-select: none;
}
.demo-btn:hover, .demo-btn.active {
    background: rgba(56, 189, 248, 0.35);
    color: #fff;
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.5);
    transform: scale(1.05);
}
</style>
</head>
<body>

<canvas id="waveCanvas"></canvas>

<!-- Ekran Altı Kuzey Işıkları Efekti -->
<div class="aurora-glow"></div>

<!-- Sağ Üst Demo Simülasyon Butonu -->
<button id="demoBtn" class="demo-btn">DEMO HIZLANDIR</button>

<div class="container" id="mainContainer">
    <div class="slider-wrapper">
        <div id="startPanel" class="panel">
            <button id="actionBtn">BAŞLAT</button>
        </div>
        
        <div id="metricPanel" class="panel">
            <div id="status">SİSTEM HAZIR</div>
            <button id="stopBtn" class="stop-btn">DURDUR</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

let currentSpeedForVisual = 0;
let waveAngle = 0;
let isEngineRunning = false;
let waveScaleFactor = 0.0;
let isSimulating = false; // Demo hızlandırma durumu
let simulatedSpeed = 0;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function animateWaves() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cy = canvas.height / 2;
    const speedFactor = isEngineRunning ? currentSpeedForVisual : 0;
    
    waveAngle += 0.03 + (speedFactor / 80);
    ctx.lineWidth = 2 + (speedFactor / 25);

    for (let w = 0; w < 3; w++) {
        ctx.beginPath();
        const alpha = 0.08 + ((0.25 + (w * 0.15)) * waveScaleFactor);
        ctx.strokeStyle = `rgba(56, 189, 248, ${alpha})`;
        
        for (let x = 0; x < canvas.width; x += 10) {
            const frequency = 0.005 + (speedFactor * 0.00015);
            const baseAmplitude = (isEngineRunning ? 40 : 15) + (speedFactor * 1.2);
            const amplitude = baseAmplitude * waveScaleFactor;
            
            const y = cy + Math.sin(x * frequency + waveAngle + (w * 0.6)) * amplitude 
                      * Math.cos(waveAngle * 0.4);

            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    requestAnimationFrame(animateWaves);
}
animateWaves();

let audioCtx = null;
let soundBuffers = {};
let activeSource = null;
let activeGain = null;
let biquadFilter = null;
let watchId = null;

let currentMode = "";
let lastLat = null;
let lastLon = null;
let lastTime = null;
let smoothedSpeed = 0;
let previousSpeed = 0;

const files = {
    idle: "idle.wav",
    cruise: "cruise.wav",
    sport: "sport.wav",
    boost: "boost.wav"
};

async function loadSounds() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        biquadFilter = audioCtx.createBiquadFilter();
        biquadFilter.type = "lowpass";
        biquadFilter.frequency.value = 400;
        biquadFilter.connect(audioCtx.destination);
    }

    for (let key in files) {
        if (!soundBuffers[key]) {
            try {
                const response = await fetch(files[key]);
                const arrayBuffer = await response.arrayBuffer();
                soundBuffers[key] = await audioCtx.decodeAudioData(arrayBuffer);
            } catch(e) {
                console.error(key + " yüklenemedi:", e);
            }
        }
    }
}

function distanceMeters(lat1, lon1, lat2, lon2){
    const R = 6371000;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function chooseMode(speed){
    if(speed < 30) return "idle";
    if(speed < 80) return "cruise";
    if(speed < 140) return "sport";
    return "boost";
}

function switchSoundMode(mode) {
    if(mode === currentMode) return;
    if(!soundBuffers[mode]) return;

    if(activeSource && activeGain) {
        try {
            activeGain.gain.setValueAtTime(activeGain.gain.value, audioCtx.currentTime);
            activeGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
            let oldSource = activeSource;
            setTimeout(() => { try { oldSource.stop(); } catch(e){} }, 200);
        } catch(e){}
    }

    const source = audioCtx.createBufferSource();
    source.buffer = soundBuffers[mode];
    source.loop = true;

    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(1.0, audioCtx.currentTime + 0.15);

    source.connect(gainNode);
    gainNode.connect(biquadFilter);
    source.start(0);

    activeSource = source;
    activeGain = gainNode;
    currentMode = mode;
}

function updateEngine(speed) {
    if(!activeSource) return;

    let rate = 0.80 + (speed / 120);
    rate = Math.max(0.75, Math.min(2.2, rate));

    activeSource.playbackRate.setValueAtTime(rate, audioCtx.currentTime);

    let targetFreq = 400 + (speed * 45);
    targetFreq = Math.max(400, Math.min(9000, targetFreq));
    biquadFilter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);

    previousSpeed = speed;
}

// DEMO BUTONU MANTIĞI (Basılı tutunca hızlanır, bırakınca yavaşlar)
const demoBtn = document.getElementById("demoBtn");

function startSimulation() {
    if(!isEngineRunning) return;
    isSimulating = true;
    demoBtn.classList.add("active");
}

function stopSimulation() {
    isSimulating = false;
    demoBtn.classList.remove("active");
}

demoBtn.addEventListener("mousedown", startSimulation);
demoBtn.addEventListener("mouseup", stopSimulation);
demoBtn.addEventListener("mouseleave", stopSimulation);

// Mobil / Dokunmatik ekranlar için
demoBtn.addEventListener("touchstart", (e) => { e.preventDefault(); startSimulation(); });
demoBtn.addEventListener("touchend", (e) => { e.preventDefault(); stopSimulation(); });

document.getElementById("actionBtn").onclick = async () => {
    const btn = document.getElementById("actionBtn");
    btn.innerText = "BAŞLATILIYOR...";
    
    document.getElementById("startPanel").classList.add("zoom-out");
    document.getElementById("metricPanel").classList.add("zoom-in");

    await loadSounds();
    
    if(audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }

    switchSoundMode("idle");
    
    isEngineRunning = true;
    waveScaleFactor = 0.0;
    const growInterval = setInterval(() => {
        waveScaleFactor += 0.05;
        if (waveScaleFactor >= 1.0) {
            waveScaleFactor = 1.0;
            clearInterval(growInterval);
        }
    }, 25);

    // GPS Takibi (Gerçek Sürüş İçin)
    watchId = navigator.geolocation.watchPosition(
        pos => {
            if(isSimulating) return; // Demo modundaysa GPS'i ezip simülasyonu çalıştıracağız
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const now = Date.now();
            let kmh = 0;

            if(lastLat !== null){
                const meters = distanceMeters(lastLat, lastLon, lat, lon);
                const seconds = (now - lastTime) / 1000;
                if(seconds > 0) kmh = (meters / seconds) * 3.6;
            }

            lastLat = lat; lastLon = lon; lastTime = now;
            smoothedSpeed += (kmh - smoothedSpeed) * 0.15;
            const speed = Math.max(0, Math.round(smoothedSpeed));

            currentSpeedForVisual = speed;
            const mode = chooseMode(speed);
            switchSoundMode(mode);
            updateEngine(speed);

            document.getElementById("status").innerText = `${mode.toUpperCase()} (${speed} KM/H)`;
        },
        err => { 
            if(!isSimulating) document.getElementById("status").innerText = "GPS BEKLENİYOR (DEMO KULLANABİLİRSİN)"; 
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );
};

// Demo hız simülasyon döngüsü (Her karede çalışır)
function runSimulationLoop() {
    if(isEngineRunning) {
        if(isSimulating) {
            simulatedSpeed += 3; // Basılı tuttukça hız artar
            if(simulatedSpeed > 180) simulatedSpeed = 180;
        } else {
            simulatedSpeed -= 4; // Bırakınca hız rölantiye düşer
            if(simulatedSpeed < 0) simulatedSpeed = 0;
        }

        if(isSimulating || simulatedSpeed > 0) {
            smoothedSpeed += (simulatedSpeed - smoothedSpeed) * 0.2;
            const speed = Math.max(0, Math.round(smoothedSpeed));
            currentSpeedForVisual = speed;

            const mode = chooseMode(speed);
            switchSoundMode(mode);
            updateEngine(speed);

            document.getElementById("status").innerText = `${mode.toUpperCase()} (${speed} KM/H)`;
        }
    }
    requestAnimationFrame(runSimulationLoop);
}
runSimulationLoop();

document.getElementById("stopBtn").onclick = () => {
    if(!audioCtx) return;
    isSimulating = false;
    demoBtn.classList.remove("active");

    if(activeGain) {
        try {
            activeGain.gain.setValueAtTime(activeGain.gain.value, audioCtx.currentTime);
            activeGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        } catch(e){}
    }

    document.getElementById("metricPanel").classList.remove("zoom-in");
    document.getElementById("startPanel").classList.remove("zoom-out");
    document.getElementById("actionBtn").innerText = "BAŞLAT";

    const decayInterval = setInterval(() => {
        waveScaleFactor -= 0.05;
        if (waveScaleFactor <= 0) {
            waveScaleFactor = 0;
            clearInterval(decayInterval);
        }
    }, 20);

    setTimeout(() => {
        if(activeSource) {
            try { activeSource.stop(); } catch(e){}
            activeSource = null;
        }
        activeGain = null;
        currentMode = "";

        if(watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }

        lastLat = null;
        lastLon = null;
        lastTime = null;
        smoothedSpeed = 0;
        simulatedSpeed = 0;
        previousSpeed = 0;
        currentSpeedForVisual = 0;
        isEngineRunning = false;

        document.getElementById("status").innerText = "SİSTEM HAZIR";
    }, 550);
};
</script>

</body>
</html>
