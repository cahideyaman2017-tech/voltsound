<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoltSound</title>

<style>
body{
    background:black;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

#speed{
    font-size:120px;
    font-weight:300;
}

button{
    margin-top:30px;
    padding:20px 50px;
    font-size:24px;
    border:none;
    border-radius:12px;
}
</style>
</head>

<body>

<div id="speed">0</div>
<div>km/h</div>

<button onclick="start()">START</button>

<audio id="engine" loop>
    <source src="iconic.wav" type="audio/wav">
</audio>

<script>

function start(){

    const audio = document.getElementById("engine");

    audio.play();

    navigator.geolocation.watchPosition(

        function(pos){

            let speed = pos.coords.speed;

            if(speed == null) speed = 0;

            let kmh = Math.round(speed * 3.6);

            document.getElementById("speed").innerText = kmh;

            let rate = 0.8 + (kmh / 100);

            if(rate > 2.2) rate = 2.2;

            audio.playbackRate = rate;

        },

        function(err){
            console.log(err);
        },

        {
            enableHighAccuracy:true,
            maximumAge:0
        }

    );

}

</script>

</body>
</html>
