<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VoltSound</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#speed{
    font-size:120px;
    font-weight:200;
}

#status{
    margin-top:10px;
    opacity:.7;
    font-size:18px;
}

button{
    margin-top:40px;
    padding:18px 40px;
    font-size:22px;
    border:none;
    border-radius:12px;
}
</style>
</head>
<body>

<div id="speed">0</div>
<div id="status">Hazır</div>

<button id="startBtn">START</button>

<script>

let currentAudio = null;
let currentName = "";

let lastLat = null;
let lastLon = null;
let lastTime = null;

const sounds = {
    idle: new Audio("idle.wav"),
    cruise: new Audio("cruise.wav"),
    sport: new Audio("sport.wav"),
    boost: new Audio("boost.wav")
};

for(const s of Object.values(sounds)){
    s.loop = true;
}

function playSound(name){

    if(currentName === name) return;

    if(currentAudio){
        currentAudio.pause();
        currentAudio.currentTime = 0;
    }

    currentAudio = sounds[name];
    currentName = name;

    currentAudio.play();

    document.getElementById("status").innerText =
        "Mode: " + name;
}

function distanceMeters(lat1, lon1, lat2, lon2){

    const R = 6371000;

    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R*c;
}

document.getElementById("startBtn").onclick = () => {

    playSound("idle");

    navigator.geolocation.watchPosition(

        pos => {

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const now = Date.now();

            let kmh = 0;

            if(lastLat !== null){

                const meters =
                    distanceMeters(
                        lastLat,
                        lastLon,
                        lat,
                        lon
                    );

                const seconds =
                    (now - lastTime) / 1000;

                if(seconds > 0){

                    kmh =
                        (meters / seconds) * 3.6;
                }
            }

            lastLat = lat;
            lastLon = lon;
            lastTime = now;

            kmh = Math.round(kmh);

            document.getElementById("speed").innerText =
                kmh;

            if(kmh < 20){
                playSound("idle");
            }
            else if(kmh < 60){
                playSound("cruise");
            }
            else if(kmh < 120){
                playSound("sport");
            }
            else{
                playSound("boost");
            }
        },

        err => {

            document.getElementById("status").innerText =
                "GPS Error";
        },

        {
            enableHighAccuracy:true,
            maximumAge:0
        }

    );
};

</script>

</body>
</html>
