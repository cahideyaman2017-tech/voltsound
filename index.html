<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla YouTube Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tesla-container">
        <!-- Sol Taraf: YouTube Video Listesi -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Önerilenler</h2>
            </div>
            <div class="video-list" id="videoList">
                <!-- JavaScript ile doldurulacak -->
            </div>
        </aside>

        <!-- Sağ Taraf: Oynatıcı ve Başlık Alanı -->
        <main class="main-content">
            <div class="player-wrapper">
                <iframe id="youtubePlayer" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
            <h2 id="videoTitle" class="video-title">Bir video seçin</h2>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
