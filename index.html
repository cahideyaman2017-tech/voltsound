<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoltSound</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#speed{
    font-size:120px;
    font-weight:200;
    line-height:1;
}

#unit{
    font-size:22px;
    opacity:.7;
    margin-top:10px;
}

#status{
    margin-top:15px;
    font-size:16px;
    opacity:.6;
}

button{
    margin-top:35px;
    padding:16px 40px;
    font-size:22px;
    border:none;
    border-radius:12px;
}
</style>
</head>
<body>

<div id="speed">0</div>
<div id="unit">km/h</div>
<div id="status">Hazır</div>

<button id="startBtn">START</button>

<script>

let currentAudio = null;
let currentMode = "";

let lastLat = null;
let lastLon = null;
let lastTime = null;

let previousKmh = 0;

const sounds = {
    idle: "idle.wav",
    cruise: "cruise.wav",
    sport: "sport.wav",
    boost: "boost.wav"
};

function playMode(mode){

    if(currentMode === mode) return;

    if(currentAudio){
        currentAudio.pause();
        currentAudio.currentTime = 0;
    }

    currentAudio = new Audio(sounds[mode]);
    currentAudio.loop = true;
    currentAudio.volume = 0.7;

    currentAudio.play().catch(()=>{});

    currentMode = mode;
}

function distanceMeters(lat1, lon1, lat2, lon2){

    const R = 6371000;

    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);

    const c = 2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );

    return R * c;
}

function updatePitch(kmh){

    if(!currentAudio) return;

    let accel = kmh - previousKmh;

    let pitch = 0.80 + (kmh / 150);

    if(accel > 1){
        pitch += 0.08;
    }

    if(accel < -1){
        pitch -= 0.08;
    }

    pitch = Math.max(0.80, Math.min(2.00, pitch));

    currentAudio.playbackRate = pitch;

    let targetVolume = 0.65;

    if(accel > 1){
        targetVolume = 0.80;
    }

    if(accel < -1){
        targetVolume = 0.50;
    }

    currentAudio.volume +=
        (targetVolume - currentAudio.volume) * 0.15;

    previousKmh = kmh;
}

function chooseMode(kmh){

    if(kmh < 30) return "idle";
    if(kmh < 80) return "cruise";
    if(kmh < 140) return "sport";
    return "boost";
}

document.getElementById("startBtn").onclick = () => {

    playMode("idle");

    navigator.geolocation.watchPosition(

        pos => {

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const now = Date.now();

            let kmh = 0;

            if(lastLat !== null){

                const meters =
                    distanceMeters(
                        lastLat,
                        lastLon,
                        lat,
                        lon
                    );

                const seconds =
                    (now - lastTime) / 1000;

                if(seconds > 0){
                    kmh =
                        (meters / seconds) * 3.6;
                }
            }

            lastLat = lat;
            lastLon = lon;
            lastTime = now;

            kmh = Math.round(kmh);

            document.getElementById("speed").innerText =
                kmh;

            const mode = chooseMode(kmh);

            playMode(mode);

            updatePitch(kmh);

            document.getElementById("status").innerText =
                mode.toUpperCase();

        },

        err => {

            document.getElementById("status").innerText =
                "GPS ERROR";
        },

        {
            enableHighAccuracy:true,
            maximumAge:0,
            timeout:10000
        }

    );

};

</script>

</body>
</html>
