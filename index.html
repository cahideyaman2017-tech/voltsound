<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VoltSound</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#speed{
    font-size:120px;
    font-weight:200;
    line-height:1;
}

#unit{
    font-size:22px;
    opacity:.7;
}

button{
    margin-top:40px;
    padding:18px 50px;
    border:none;
    border-radius:14px;
    font-size:22px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="speed">0</div>
<div id="unit">km/h</div>

<button id="startBtn">START</button>

<audio id="idle" loop src="idle.wav"></audio>
<audio id="cruise" loop src="cruise.wav"></audio>
<audio id="sport" loop src="sport.wav"></audio>
<audio id="boost" loop src="boost.wav"></audio>

<script>

const idle = document.getElementById("idle");
const cruise = document.getElementById("cruise");
const sport = document.getElementById("sport");
const boost = document.getElementById("boost");

const audios = [idle, cruise, sport, boost];

function setVolumes(speed){

    let vIdle = 0;
    let vCruise = 0;
    let vSport = 0;
    let vBoost = 0;

    if(speed < 20){
        vIdle = 1;
    }

    else if(speed < 40){
        let t = (speed - 20) / 20;
        vIdle = 1 - t;
        vCruise = t;
    }

    else if(speed < 80){
        vCruise = 1;
    }

    else if(speed < 120){
        let t = (speed - 80) / 40;
        vCruise = 1 - t;
        vSport = t;
    }

    else if(speed < 150){
        vSport = 1;
    }

    else{
        let t = Math.min((speed - 150) / 30, 1);
        vSport = 1 - t;
        vBoost = t;
    }

    idle.volume = vIdle * 0.8;
    cruise.volume = vCruise * 0.8;
    sport.volume = vSport * 0.9;
    boost.volume = vBoost;

    idle.playbackRate = 0.9 + speed/250;
    cruise.playbackRate = 0.95 + speed/300;
    sport.playbackRate = 1 + speed/350;
    boost.playbackRate = 1 + speed/400;
}

document.getElementById("startBtn").addEventListener("click", async () => {

    for(const audio of audios){
        audio.volume = 0;
        await audio.play();
    }

    navigator.geolocation.watchPosition(

        (pos) => {

            let speed = pos.coords.speed || 0;

            let kmh = Math.round(speed * 3.6);

            document.getElementById("speed").textContent = kmh;

            setVolumes(kmh);
        },

        (err) => {
            console.log(err);
        },

        {
            enableHighAccuracy:true,
            maximumAge:0
        }

    );

});

</script>

</body>
</html>
