<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VoltSound</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#speed{
    font-size:120px;
    font-weight:200;
}

#unit{
    font-size:22px;
    opacity:.7;
}

button{
    margin-top:40px;
    padding:20px 50px;
    font-size:24px;
    border:none;
    border-radius:14px;
}
</style>
</head>
<body>

<div id="speed">0</div>
<div id="unit">km/h</div>

<button id="startBtn">START</button>

<script>

let idleAudio;
let cruiseAudio;
let sportAudio;
let boostAudio;

function fade(audio,target){
    audio.volume += (target - audio.volume) * 0.08;
}

document.getElementById("startBtn").onclick = async () => {

    idleAudio = new Audio("idle.wav");
    cruiseAudio = new Audio("cruise.wav");
    sportAudio = new Audio("sport.wav");
    boostAudio = new Audio("boost.wav");

    const sounds = [
        idleAudio,
        cruiseAudio,
        sportAudio,
        boostAudio
    ];

    sounds.forEach(a=>{
        a.loop = true;
        a.volume = 0;
    });

    try{

        await idleAudio.play();
        await cruiseAudio.play();
        await sportAudio.play();
        await boostAudio.play();

        idleAudio.volume = 1;

    }catch(e){
        console.log(e);
    }

    navigator.geolocation.watchPosition(

        pos => {

            let speed = pos.coords.speed || 0;
            let kmh = Math.round(speed * 3.6);

            document.getElementById("speed").innerText = kmh;

            let idleTarget = 0;
            let cruiseTarget = 0;
            let sportTarget = 0;
            let boostTarget = 0;

            if(kmh < 20){
                idleTarget = 1;
            }
            else if(kmh < 60){
                cruiseTarget = 1;
            }
            else if(kmh < 120){
                sportTarget = 1;
            }
            else{
                boostTarget = 1;
            }

            fade(idleAudio,idleTarget);
            fade(cruiseAudio,cruiseTarget);
            fade(sportAudio,sportTarget);
            fade(boostAudio,boostTarget);

        },

        err => {
            console.log(err);

            document.getElementById("speed").innerText = "0";

            fade(idleAudio,1);
            fade(cruiseAudio,0);
            fade(sportAudio,0);
            fade(boostAudio,0);
        },

        {
            enableHighAccuracy:true,
            maximumAge:0
        }

    );

};

</script>

</body>
</html>
